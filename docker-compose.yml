services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ALM_REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    command: ["python", "-m", "worker.main"]
    env_file:
      - .env
    environment:
      - ALM_REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
